version: "3.8"

services:
  backend:
    build: ./pony-backend
    container_name: pony-backend
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DB_HOST: gateway01.ap-southeast-1.prod.aws.tidbcloud.com
      DB_PORT: 4000
      DB_USERNAME: E8oVMb53JmihxCk.ponyuser
      DB_PASSWORD: pony12345
      DB_NAME: test
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: pony-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pony_shop
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ${PWD}/database/setup.sql:/docker-entrypoint-initdb.d/setup.sql

volumes:
  db_data: