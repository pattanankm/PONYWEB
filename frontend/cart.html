<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Cart - PonyParadise</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
body{
font-family:'Nunito',sans-serif;
background:#fff0fb;
padding:40px;
}

h1{
font-family:'Fredoka One';
color:#f472b6;
margin-bottom:30px;
}

.cart-item{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.price{
font-weight:700;
color:#f472b6;
}

button{
background:#f472b6;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.total{
font-size:22px;
margin-top:30px;
font-weight:bold;
}

.checkout{
margin-top:20px;
padding:12px 20px;
background:#c084fc;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Your Cart 🛒</h1>

<div id="cart-list"></div>

<div class="total">
Total: <span id="total-price">0</span> ฿
</div>

<button class="checkout" onclick="goCheckout()">Checkout</button>

<script src="js/cart.js"></script>

</body>
</html>
