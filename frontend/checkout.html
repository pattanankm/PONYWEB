<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Checkout - PonyParadise</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family:'Nunito',sans-serif;
  background: linear-gradient(135deg, #fff0fb 0%, #e0f2fe 50%, #fff0fb 100%);
  min-height: 100vh;
  padding: 20px;
}

.header {
  background: linear-gradient(135deg, #f472b6 0%, #c084fc 100%);
  color: white;
  padding: 30px 40px;
  border-radius: 16px;
  margin-bottom: 30px;
  box-shadow: 0 8px 24px rgba(244, 114, 182, 0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left h1 {
  font-family:'Fredoka One';
  font-size: 2.8rem;
  margin-bottom: 10px;
}

.total-display {
  font-size: 0.95rem;
  opacity: 0.95;
  margin-bottom: 10px;
}

.total-amount {
  font-size: 2.4rem;
  font-weight: 700;
}

.checkout-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  max-width: 1200px;
  margin: 0 auto;
}

.shipping-section {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,.08);
}

.shipping-section h2 {
  font-family:'Fredoka One';
  color: #1e293b;
  margin-bottom: 8px;
  font-size: 1.4rem;
}

.shipping-subtitle {
  color: #888;
  margin-bottom: 20px;
  font-size: 0.9rem;
}

.form-group {
  margin-bottom: 16px;
}

label {
  display: block;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 6px;
}

input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid #e8d7f0;
  border-radius: 10px;
  font-size: 14px;
  font-family:'Nunito';
  transition: all 0.2s;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #f472b6;
  box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.1);
}

.checkbox-group {
  display: flex;
  align-items: center;
  margin: 20px 0;
  gap: 10px;
}

.checkbox-group input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.checkbox-group label {
  margin: 0;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}

.checkbox-group a {
  color: #7c3aed;
  text-decoration: none;
  font-weight: 600;
}

.checkbox-group a:hover {
  text-decoration: underline;
}

.save-btn {
  background: #1e293b;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  margin-top: 20px;
  width: 100%;
  transition: all 0.2s;
}

.save-btn:hover {
  background: #0f172a;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}

.save-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.order-summary-section {
  background: linear-gradient(135deg, #fef3c7 0%, #fef08a 100%);
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,.08);
}

.order-summary-section h2 {
  font-family:'Fredoka One';
  color: #1e293b;
  margin-bottom: 20px;
  font-size: 1.4rem;
}

#order-summary {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 20px;
  max-height: 400px;
  overflow-y: auto;
  padding-right: 10px;
}

.order-item {
  background: white;
  border-radius: 12px;
  padding: 14px;
  display: flex;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}

.order-item-image {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}

.order-item-info {
  flex: 1;
}

.order-item-name {
  font-weight: 700;
  color: #1e293b;
  font-size: 0.95rem;
  margin-bottom: 4px;
}

.order-item-type {
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 2px;
}

.order-item-rarity {
  font-size: 0.75rem;
  color: #888;
}

.order-item-price {
  color: #7a22cb;
  font-weight: 700;
  font-size: 0.95rem;
  margin-top: 6px;
}

.summary-divider {
  border-top: 2px solid rgba(0,0,0,0.1);
  margin: 16px 0;
}

.total-section {
  background: white;
  padding: 14px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.total-label {
  font-weight: 700;
  color: #1e293b;
}

.total-price {
  font-size: 1.4rem;
  font-weight: 700;
  color: #7a22cb;
}

.empty-cart {
  padding: 40px 20px;
  text-align: center;
  color: #888;
}

.empty-cart a {
  color: #7c3aed;
  text-decoration: none;
  font-weight: 600;
}

@media (max-width: 768px) {
  .checkout-container {
    grid-template-columns: 1fr;
  }

  .header {
    flex-direction: column;
    gap: 20px;
    align-items: flex-start;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Checkout</h1>
  </div>
  <div class="header-right">
    <div class="total-display">Total</div>
    <div class="total-amount">Baht <span id="header-total">0</span></div>
  </div>
</div>

<div class="checkout-container">
  <!-- LEFT: Shipping Information -->
  <div class="shipping-section">
    <h2>Shipping information</h2>
    <p class="shipping-subtitle">We ship within 2 working days</p>
    
    <form id="checkout-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" name="name" type="text" required placeholder="Ex : Khaimook Inwza" />
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <select id="location" name="location" required>
          <option value="">Where are you living</option>
          <option value="bangkok">Bangkok</option>
          <option value="chiang-mai">Chiang Mai</option>
          <option value="phuket">Phuket</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="delivery-note">Address Detail</label>
        <textarea id="delivery-note" name="delivery-note" rows="4" placeholder="suthep muang chaingmai 50000"></textarea>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Ex : MookInwZa007@gmail.com" />
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="tel" placeholder="0XX-XXXX-XXXX" />
      </div>

      <div class="form-group">
        <label for="paymethod">Payment method</label>
        <select id="paymethod" name="paymethod" required>
          <option value="">Choose payment</option>
          <option value="cod">Cash on delivery</option>
          <option value="bank">Bank transfer</option>
          <option value="credit">Credit card</option>
        </select>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" name="terms" required />
        <label for="terms">I accept the terms <a href="#">Read our T&Cs</a></label>
      </div>

      <button type="submit" class="save-btn">Save shipping information</button>
    </form>
  </div>

  <!-- RIGHT: Order Summary -->
  <div class="order-summary-section">
    <h2>Order summary</h2>
    <div id="order-summary"></div>
    <div class="summary-divider"></div>
    <div class="total-section">
      <span class="total-label">Total:</span>
      <span class="total-price"><span id="total-price">0</span> ฿</span>
    </div>
  </div>
</div>

<script>
const ponyInfo = {
  'Princess Celestia': { type: 'Alicorn', rarity: 'A' },
  'Princess Luna': { type: 'Alicorn', rarity: 'A' },
  'Applejack': { type: 'Earth Pony', rarity: 'B' },
  'Fluttershy': { type: 'Pegasus', rarity: 'B' },
  'Rarity': { type: 'Unicorn', rarity: 'B' },
  'Pinkie Pie': { type: 'Earth Pony', rarity: 'B' },
  'Twilight Sparkle': { type: 'Alicorn', rarity: 'A' },
  'Rainbow Dash': { type: 'Pegasus', rarity: 'B' },
  'Wensley': { type: 'Earth Pony', rarity: 'C' },
  'Princess Cadance': { type: 'Alicorn', rarity: 'A' }
};

const cart = JSON.parse(localStorage.getItem('cart') || '[]');
const orderSummary = document.getElementById('order-summary');
const totalPrice = document.getElementById('total-price');
const headerTotal = document.getElementById('header-total');
const form = document.getElementById('checkout-form');
const checkoutContainer = document.querySelector('.checkout-container');

function renderSummary(){
  if (!cart.length){
    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'empty-cart';
    emptyDiv.innerHTML = 'Your cart is empty. <a href="shop.html">Go back to shop</a>.';
    checkoutContainer.innerHTML = '';
    checkoutContainer.appendChild(emptyDiv);
    return;
  }

  let total = 0;
  orderSummary.innerHTML = '';

  cart.forEach(item => {
    const info = ponyInfo[item.name] || { type: 'Unknown', rarity: 'C' };
    const itemDiv = document.createElement('div');
    itemDiv.className = 'order-item';
    itemDiv.innerHTML = `
      <img src="https://placehold.co/80x80/fce7f3/c084fc?text=🐴" alt="${item.name}" class="order-item-image" onerror="this.src='https://placehold.co/80x80/fce7f3/c084fc?text=🐴'" />
      <div class="order-item-info">
        <div class="order-item-name">${item.name}</div>
        <div class="order-item-type">Pony Type : ${info.type}</div>
        <div class="order-item-rarity">Rarity : ${info.rarity}</div>
        <div class="order-item-price">${Number(item.price).toLocaleString()} B</div>
      </div>
    `;
    orderSummary.appendChild(itemDiv);
    total += Number(item.price);
  });

  totalPrice.innerText = total.toLocaleString();
  headerTotal.innerText = total.toLocaleString();
}

if (form && cart.length > 0) {
    form.addEventListener('submit', async event => {
    event.preventDefault();

    if (!cart.length){
      alert('Your cart is empty.');
      return;
    }

    const order = {
      id: 'ORD-' + Date.now(),
      createdAt: new Date().toISOString(),
      customer: {
        name: form.name.value.trim(),
        location: form.location.value.trim(),
        deliveryNote: form.querySelector('#delivery-note').value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim(),
        method: form.paymethod.value
      },
      items: cart,
      total: Number(totalPrice.textContent.replace(/,/g, ''))
    };

    const user = JSON.parse(localStorage.getItem('customer') || '{}');

const res = await fetch('http://localhost:3000/orders', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    customer_id: user.customer_id || null,
    total: Number(totalPrice.textContent.replace(/,/g, '')),
    status: 'pending',
    items: cart
  })
});

const data = await res.json();
if (res.ok) {
  localStorage.setItem('cart', JSON.stringify([]));
  alert('Order placed! ID: ' + data.order_id);
  window.location.href = 'index.html';
} else {
  alert('Error: ' + (data.message || 'Order failed'));
}

  });
}

renderSummary();
</script>
<script src="js/navbar.js"></script>
</body>
</html>
