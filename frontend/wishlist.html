<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist - PonyParadise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #f472b6;
      --pink-lt: #fce7f3;
      --purple: #c084fc;
      --yellow: #fde68a;
      --dark: #2d1b4e;
      --radius: 1.2rem;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-image: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
                        url('images/ponypayment.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--dark);
      margin: 0;
      padding: 0;
    }

    /* ── NAVBAR ─────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 2.5rem;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1.5px solid rgba(244, 114, 182, 0.18);
      box-shadow: 0 2px 24px rgba(192, 132, 252, 0.08);
    }

    .nav-logo span {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--dark);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--pink);
    }

    .nav-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.3rem;
      border-radius: 50px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(244, 114, 182, 0.3);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--pink);
      color: var(--pink);
    }

    .btn-outline:hover {
      background: var(--pink-lt);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
    }

    /* ── MAIN CONTENT ───────────────────────── */
    main {
      padding-top: 100px;
      max-width: 900px;
      margin: 0 auto;
      padding-left: 2rem;
      padding-right: 2rem;
      padding-bottom: 3rem;
    }

    .wishlist-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 4vw, 2.8rem);
      background: linear-gradient(90deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }

    .wishlist-section {
      background: #fff;
      padding: 2rem;
      border-radius: var(--radius);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      border: 1.5px solid rgba(244, 114, 182, 0.12);
    }

    .wishlist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      padding: 1.2rem 0;
    }

    .wishlist-item:last-child {
      border-bottom: none;
    }

    .item-left {
      display: flex;
      flex-direction: column;
    }

    .item-name {
      font-weight: 700;
      color: #1e293b;
      font-size: 1rem;
    }

    .item-price {
      color: var(--pink);
      margin-top: 0.4rem;
      font-weight: 600;
    }

    .item-actions {
      display: flex;
      gap: 0.8rem;
    }

    .remove-btn {
      background: #fee2e2;
      color: #dc2626;
      border: 1.5px solid #fca5a5;
      cursor: pointer;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .remove-btn:hover {
      background: #fecaca;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
    }

    .total-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-weight: 700;
      font-size: 1rem;
      color: var(--dark);
    }

    .total-value {
      font-weight: 700;
      font-size: 1.8rem;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #wishlist-empty {
      margin: 1.5rem 0;
      color: #888;
      text-align: center;
      padding: 2rem;
      font-size: 1.1rem;
    }

    #wishlist-empty a {
      color: var(--pink);
      text-decoration: none;
      font-weight: 700;
    }

    #wishlist-empty a:hover {
      text-decoration: underline;
    }

    .checkout-btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem;
    }

    /* ── FOOTER ─────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem;
      color: #888;
      margin-top: 3rem;
    }

    footer span {
      color: var(--pink);
    }

    @media (max-width: 768px) {
      nav {
        padding: 0.8rem 1rem;
      }

      .nav-links {
        gap: 1rem;
      }

      main {
        padding-top: 80px;
      }

      .total-section {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav>
    <div class="nav-logo">
      <span>🌈 PonyParadise</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home Page</a></li>
      <li><a href="cart.html">Cart 🛒</a></li>
      <li><a href="wishlist.html">Wishlist 💖</a></li>
    </ul>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-outline">Sign in</a>
      <a href="register.html" class="btn btn-primary">Register</a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main>
    <h1 class="wishlist-title">Wishlist 💖</h1>
    <div class="wishlist-section">
      <div id="wishlist-empty">Your wishlist is empty. <a href="shop.html">Browse ponies</a>.</div>
      <div id="wishlist-list"></div>
      <div class="total-section" id="total-section" style="display: none;">
        <span class="total-label">Total estimated value:</span>
        <span class="total-value"><span id="wishlist-total">0</span> ฿</span>
      </div>
      <a href="checkout.html" class="btn btn-primary checkout-btn" id="checkout-btn" style="display: none;">Go to Checkout</a>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>Made with <span>💖</span> by Group 2 · PonyParadise © 2026</p>
  </footer>

  <script type="module" src="js/wishlist.js"></script>
  <script src="js/navbar.js"></script>
</body>
</html>
