<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Wishlist - PonyParadise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
      body { font-family: 'Nunito',sans-serif; background:#fff0fb; margin:0; padding:40px; max-width:900px; margin-left:auto; margin-right:auto; }
      nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }ิ /*bnmkl*/
      .nav-links { list-style:none; display:flex; gap:14px; margin:0; padding:0; }
      .nav-links a { text-decoration:none; color:#6b21a8; font-weight:700; }
      h1 { font-family:'Fredoka One'; color:#f472b6; margin-bottom:16px; }
      section { background:#fff; padding:20px; border-radius:14px; box-shadow:0 6px 20px rgba(0,0,0,.08); }
    .wishlist-item { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding:12px 0; }
    .wishlist-item:last-child { border-bottom:none; }
    .item-left { display:flex; flex-direction:column; }
    .item-name { font-weight:700; color:#1e293b; }
    .item-price { color:#6b21a8; margin-top:2px; }
    .item-actions { display:flex; gap:8px; }
    .small-btn { border:1px solid #c4b5fd; background:#f5e6ff; color:#5b21b6; cursor:pointer; border-radius:8px; padding:6px 10px; }
    .total { font-weight:700; font-size:18px; margin-top:12px; }
    #wishlist-empty { margin:12px 0; color:#555; }
    .btn-primary { background:#f472b6; color:#fff; border:none; padding:8px 12px; border-radius:8px; text-decoration:none; }
  </style>
</head>
<body>
  <nav>
    <span style="font-size:1.14rem;">🌈 PonyParadise</span>
    <ul class="nav-links">
      <li><a href="index.html">Home Page</a></li>
      <li><a href="cart.html">Cart 🛒</a></li>
      <li><a href="wishlist.html">Wishlist 💖</a></li>
    </ul>
    <a href="checkout.html" class="btn-primary">Go to Checkout</a>
  </nav>

  <h1>Wishlist</h1>
  <section>
    <div id="wishlist-empty">Your wishlist is empty. <a href="shop.html">Browse ponies</a>.</div>
    <div id="wishlist-list"></div>
    <div class="total">Total estimated value: <span id="wishlist-total">0</span> ฿</div>
  </section>

 <script type="module" src="js/wishlist.js"></script>
  <script src="js/navbar.js"></script>
</body>
</html>
